<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Smart Canteen – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* Scoped insurance rules – override anything that breaks the layout */
    html, body { margin:0; padding:0; width:100%; height:100%; }
    body.login-page {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
    }
    body.login-page .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      width: 100%;
    }
  </style>
</head>
<body class="login-page">

  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-hero">
        <div class="login-icon">🍽️</div>
        <h1 class="login-title">Smart Canteen</h1>
        <p class="login-sub">Automated Order Taking System</p>
      </div>

      <p class="login-prompt">Please select how you would like to log in</p>

      <div class="login-options">
        <a href="/customer" class="role-card customer-card">
          <span class="role-icon">👤</span>
          <div class="role-info">
            <span class="role-name">Customer</span>
            <span class="role-desc">Browse menu &amp; place orders</span>
          </div>
          <span class="role-arrow">→</span>
        </a>

        <a href="/admin" class="role-card admin-card">
          <span class="role-icon">👨‍🍳</span>
          <div class="role-info">
            <span class="role-name">Administrator</span>
            <span class="role-desc">Kitchen dashboard &amp; order management</span>
          </div>
          <span class="role-arrow">→</span>
        </a>
      </div>

    </div>
  </div>

  <div class="dev-credit">Developed by CS KARTHIK AND DHARAN</div>

</body>
</html>
